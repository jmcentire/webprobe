        manual_notes: "Availability testing (DDoS resilience, failover, redundancy) requires infrastructure-level assessment. TLS certificate expiry is the main web-testable indicator."

  # ---------------------------------------------------------------------------
  # Privacy by Design
  # ---------------------------------------------------------------------------
  privacy_by_design:
    name: "Privacy by Design"
    version: "2009"
    controls:
      - id: "PbD-1"
        name: "Proactive not Reactive; Preventative not Remedial"
        testable: partial
        finding_matchers:
          - category: "headers"
            title_pattern: ".*Content-Security-Policy.*"
          - category: "headers"
            title_pattern: ".*Strict-Transport-Security.*"
          - category: "headers"
            title_pattern: ".*HSTS.*"
          - category: "headers"
            title_pattern: ".*Permissions-Policy.*"
        manual_notes: "Proactive privacy posture requires organizational culture assessment beyond technical controls."

      - id: "PbD-2"
        name: "Privacy as the Default Setting"
        testable: partial
        finding_matchers:
          - category: "cookies"
            title_pattern: ".*SameSite.*"
          - category: "headers"
            title_pattern: ".*Referrer-Policy.*"
          - category: "privacy"
          - category: "headers"
            title_pattern: ".*Permissions-Policy.*"
        manual_notes: "Default privacy settings in application logic require functional testing."

      - id: "PbD-3"
        name: "Privacy Embedded into Design"
        testable: partial
        finding_matchers:
          - category: "headers"
            title_pattern: ".*Content-Security-Policy.*"
          - category: "cookies"
            title_pattern: ".*missing Secure flag.*"
          - category: "cookies"
            title_pattern: ".*HttpOnly.*"
          - category: "tls"
        manual_notes: "Architectural privacy embedding requires design review and threat modeling."

      - id: "PbD-4"
        name: "Full Functionality -- Positive-Sum, not Zero-Sum"
        testable: no
        finding_matchers: []
        manual_notes: "Balancing privacy with functionality is a design philosophy not measurable via scanning."

      - id: "PbD-5"
        name: "End-to-End Security -- Full Lifecycle Protection"
        testable: partial
        finding_matchers:
          - category: "tls"
          - category: "mixed_content"
          - category: "cookies"
            title_pattern: ".*missing Secure flag.*"
          - category: "headers"
            title_pattern: ".*Strict-Transport-Security.*"
        manual_notes: "Data lifecycle protection (creation through deletion) requires process and infrastructure review."

      - id: "PbD-6"
        name: "Visibility and Transparency"
        testable: partial
        finding_matchers:
          - category: "privacy"
        manual_notes: "Privacy policy presence detectable; policy completeness, accuracy, and accessibility require legal review."

      - id: "PbD-7"
        name: "Respect for User Privacy"
        testable: partial
        finding_matchers:
          - category: "privacy"
          - category: "cookies"
            title_pattern: ".*SameSite.*"
          - category: "headers"
            title_pattern: ".*Permissions-Policy.*"
        manual_notes: "User-centric privacy measures (consent, data portability, deletion) require functional testing."

